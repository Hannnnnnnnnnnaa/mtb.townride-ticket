<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MTB 乗車チケット</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green:      #2e7d32;
      --green-lt:   #43a047;
      --green-pale: #e8f5e9;
      --orange:     #f57c00;
      --orange-lt:  #ff9800;
      --yellow:     #fdd835;
      --sky:        #e3f2fd;
      --white:      #ffffff;
      --gray-lt:    #f5f5f5;
      --gray:       #9e9e9e;
      --text-dark:  #1b2a1b;
      --text-mid:   #4a5a4a;
    }

    html, body {
      min-height: 100%;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    body {
      background: linear-gradient(160deg, #c8e6c9 0%, #fff9c4 50%, #ffe0b2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 28px 16px 36px;
    }

    /* ===== Header ===== */
    .page-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--green);
      color: var(--yellow);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 20px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(46,125,50,0.3);
    }

    .brand-badge svg {
      width: 13px;
      height: 13px;
      fill: var(--yellow);
    }

    .page-header h1 {
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ===== Ticket wrapper ===== */
    .ticket-wrapper {
      width: 100%;
      max-width: 390px;
      position: relative;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.18));
    }

    .ticket {
      width: 100%;
      position: relative;
      transition: transform 0.3s ease;
    }

    .ticket:hover {
      transform: translateY(-3px);
    }

    /* ===== Top section ===== */
    .ticket-top {
      background: linear-gradient(135deg, var(--green-lt) 0%, var(--green) 100%);
      border-radius: 22px 22px 0 0;
      padding: 26px 22px 22px;
      position: relative;
      overflow: hidden;
    }

    /* Sunburst rays */
    .ticket-top::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      background: conic-gradient(
        rgba(255,255,255,0.10) 0deg 20deg,
        transparent 20deg 40deg,
        rgba(255,255,255,0.10) 40deg 60deg,
        transparent 60deg 80deg,
        rgba(255,255,255,0.10) 80deg 100deg,
        transparent 100deg 120deg,
        rgba(255,255,255,0.10) 120deg 140deg,
        transparent 140deg 160deg,
        rgba(255,255,255,0.10) 160deg 180deg,
        transparent 180deg 360deg
      );
      border-radius: 50%;
    }

    /* Mountain silhouette */
    .mountain-bg {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      opacity: 0.15;
    }

    .ticket-top-inner {
      position: relative;
      z-index: 1;
    }

    /* Limited badge */
    .ticket-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--yellow);
      color: var(--text-dark);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 4px;
      margin-bottom: 16px;
      box-shadow: 0 2px 6px rgba(253,216,53,0.5);
    }

    .ticket-label svg {
      width: 10px;
      height: 10px;
      fill: var(--orange);
    }

    /* Icon + Title row */
    .ticket-icon-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 18px;
    }

    .bike-icon-wrap {
      flex-shrink: 0;
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, var(--orange-lt), var(--orange));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(245,124,0,0.5);
    }

    .bike-icon-wrap svg {
      width: 36px;
      height: 36px;
      fill: #fff;
    }

    .ticket-title-block h2 {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.35;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .ticket-title-block h2 .highlight {
      color: var(--yellow);
    }

    .ticket-title-block .subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      margin-top: 5px;
      letter-spacing: 0.04em;
    }

    /* Info pills */
    .validity-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .validity-item {
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(4px);
      border-radius: 10px;
      padding: 8px 12px;
      flex: 1;
      min-width: 80px;
    }

    .validity-item .v-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-bottom: 3px;
    }

    .validity-item .v-value {
      font-size: 13px;
      font-weight: 800;
      color: #fff;
    }

    /* ===== Tear line ===== */
    .tear-line {
      background: var(--gray-lt);
      position: relative;
      height: 26px;
      display: flex;
      align-items: center;
    }

    .tear-line::before,
    .tear-line::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 26px;
      background: linear-gradient(160deg, #c8e6c9 0%, #fff9c4 50%, #ffe0b2 100%);
      border-radius: 50%;
      z-index: 2;
    }

    .tear-line::before { left: -13px; }
    .tear-line::after  { right: -13px; }

    .tear-dashes {
      width: 100%;
      height: 0;
      border-top: 2.5px dashed rgba(100,150,100,0.35);
      margin: 0 18px;
    }

    /* ===== Bottom section ===== */
    .ticket-bottom {
      background: var(--white);
      border-radius: 0 0 22px 22px;
      padding: 20px 22px 26px;
    }

    /* Present text box */
    .present-text {
      text-align: center;
      font-size: 13.5px;
      color: var(--text-mid);
      line-height: 1.65;
      margin-bottom: 18px;
      padding: 14px 16px;
      background: var(--green-pale);
      border-radius: 12px;
      border-left: 4px solid var(--green-lt);
    }

    .present-text strong {
      color: var(--green);
      font-weight: 800;
      font-size: 14px;
    }

    .present-text .en-sub {
      display: block;
      font-size: 11px;
      color: var(--gray);
      margin-top: 4px;
    }

    /* ===== Staff button ===== */
    .staff-btn-wrap {
      text-align: center;
    }

    .staff-btn-label {
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #staffBtn {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.05em;
      cursor: pointer;
      background: linear-gradient(135deg, var(--orange-lt) 0%, var(--orange) 100%);
      color: #fff;
      box-shadow: 0 5px 18px rgba(245,124,0,0.4);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    #staffBtn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 55%);
      pointer-events: none;
      border-radius: 14px;
    }

    #staffBtn:active:not(:disabled) {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(245,124,0,0.3);
    }

    #staffBtn:disabled {
      background: #e0e0e0;
      color: #9e9e9e;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ===== Used overlay ===== */
    .used-overlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background: rgba(255,255,255,0.82);
      z-index: 10;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      backdrop-filter: blur(6px);
    }

    .used-overlay.visible {
      display: flex;
    }

    .used-stamp {
      border: 5px solid #e53935;
      border-radius: 14px;
      padding: 14px 32px;
      transform: rotate(-12deg);
      animation: stampIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes stampIn {
      from { transform: rotate(-12deg) scale(2.8); opacity: 0; }
      to   { transform: rotate(-12deg) scale(1);   opacity: 1; }
    }

    .used-stamp-text {
      font-size: 36px;
      font-weight: 900;
      color: #e53935;
      letter-spacing: 0.1em;
      line-height: 1;
    }

    .used-stamp-sub {
      font-size: 12px;
      color: #e53935;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-align: center;
      margin-top: 4px;
    }

    .used-time {
      font-size: 12px;
      color: var(--text-mid);
      letter-spacing: 0.05em;
      background: var(--gray-lt);
      padding: 6px 16px;
      border-radius: 20px;
    }

    /* ===== Footer ===== */
    .page-footer {
      margin-top: 22px;
      text-align: center;
      font-size: 11px;
      color: var(--green);
      opacity: 0.6;
      letter-spacing: 0.06em;
    }

    /* ===== Pulse on valid ===== */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(67,160,71,0.45); }
      50%       { box-shadow: 0 0 0 10px rgba(67,160,71,0); }
    }

    .ticket-top {
      animation: pulse-glow 2.8s ease-in-out infinite;
    }

    .ticket-top.used {
      animation: none;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="page-header">
    <div class="brand-badge">
      <svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 0 0 8 20C19 20 22 3 22 3c-1 2-8 2-8 2s-4 0-4 4c0 1.5.5 2.5 1.5 3.5C12 13 14 14 14 14s-1.5-1-2-3c0 0 2-2 5-3z"/></svg>
      MTB Adventure Pass
    </div>
    <h1>Special Ride Ticket</h1>
  </header>

  <!-- Ticket -->
  <div class="ticket-wrapper">
    <div class="ticket" id="ticketCard">

      <!-- Used overlay -->
      <div class="used-overlay" id="usedOverlay">
        <div class="used-stamp">
          <div class="used-stamp-text">USED</div>
          <div class="used-stamp-sub">使用済み</div>
        </div>
        <div class="used-time" id="usedTime"></div>
      </div>

      <!-- Top green section -->
      <div class="ticket-top" id="ticketTop">
        <svg class="mountain-bg" viewBox="0 0 400 64" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="0,64 55,18 115,44 200,4 285,38 345,12 400,30 400,64" fill="white"/>
        </svg>

        <div class="ticket-top-inner">
          <div class="ticket-label">
            <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            Limited Ticket
          </div>

          <div class="ticket-icon-row">
            <div class="bike-icon-wrap">
              <svg viewBox="0 0 24 24"><path d="M5 20.5A3.5 3.5 0 0 1 1.5 17 3.5 3.5 0 0 1 5 13.5 3.5 3.5 0 0 1 8.5 17 3.5 3.5 0 0 1 5 20.5m0-2A1.5 1.5 0 0 0 6.5 17 1.5 1.5 0 0 0 5 15.5 1.5 1.5 0 0 0 3.5 17 1.5 1.5 0 0 0 5 18.5M19 20.5A3.5 3.5 0 0 1 15.5 17 3.5 3.5 0 0 1 19 13.5 3.5 3.5 0 0 1 22.5 17 3.5 3.5 0 0 1 19 20.5m0-2A1.5 1.5 0 0 0 20.5 17 1.5 1.5 0 0 0 19 15.5 1.5 1.5 0 0 0 17.5 17 1.5 1.5 0 0 0 19 18.5M19 8l-4 4h2.5l-2 5h-2l2-5H12l-1.5-4H8v-2h3.5l1.5 4h1.5l3.5-3.5L19 8m-7-3.5A1.5 1.5 0 0 1 13.5 6 1.5 1.5 0 0 1 12 7.5 1.5 1.5 0 0 1 10.5 6 1.5 1.5 0 0 1 12 4.5z"/></svg>
            </div>
            <div class="ticket-title-block">
              <h2>MTB（マウンテンバイク）<br><span class="highlight">無料乗車チケット</span><br>ゲット！</h2>
              <div class="subtitle">Mountain Bike Free Ride Pass</div>
            </div>
          </div>

          <div class="validity-strip">
            <div class="validity-item">
              <span class="v-label">Type</span>
              <span class="v-value">1 Ride</span>
            </div>
            <div class="validity-item">
              <span class="v-label">対象</span>
              <span class="v-value">タウンライド</span>
            </div>
            <div class="validity-item">
              <span class="v-label">Status</span>
              <span class="v-value" id="statusValue" style="color:#b9f6ca;">● VALID</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Tear line -->
      <div class="tear-line">
        <div class="tear-dashes"></div>
      </div>

      <!-- Bottom white section -->
      <div class="ticket-bottom">
        <div class="present-text">
          <strong>こちらの画面を受付スタッフにご提示ください。</strong>
          <span class="en-sub">Please show this screen to the reception staff.</span>
        </div>

        <div class="staff-btn-wrap">
          <div class="staff-btn-label">— Staff Only —</div>
          <button id="staffBtn" onclick="markAsUsed()">
            ✓ スタッフ確認 / 使用済みにする
          </button>
        </div>
      </div>

    </div><!-- /.ticket -->
  </div><!-- /.ticket-wrapper -->

  <footer class="page-footer">
    MTB Adventure Pass &nbsp;|&nbsp; このチケットは1回限り有効です
  </footer>

  <script>
    function markAsUsed() {
      const btn       = document.getElementById('staffBtn');
      const overlay   = document.getElementById('usedOverlay');
      const ticketTop = document.getElementById('ticketTop');
      const statusVal = document.getElementById('statusValue');
      const usedTime  = document.getElementById('usedTime');

      btn.disabled    = true;
      btn.textContent = '✕ 使用済み / USED';

      statusVal.textContent = '✕ USED';
      statusVal.style.color = '#e53935';

      ticketTop.classList.add('used');

      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      usedTime.textContent =
        `使用日時: ${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} `
        + `${pad(now.getHours())}:${pad(now.getMinutes())}`;

      setTimeout(() => overlay.classList.add('visible'), 120);
    }
  </script>

</body>
</html>
